# Prefix: ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Scrollback
set -g history-limit 1000000

# Vi mode
set -g mode-keys vi
set -g status-keys vi

# Sensible defaults
set -s escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g repeat-time 400

# True color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:hyperlinks"

# Mouse
set -g mouse on
unbind -Tcopy-mode-vi MouseDragEnd1Pane
set -s copy-command 'pbcopy'

# Vi copy bindings
bind -Tcopy-mode-vi v send -X begin-selection
bind -Tcopy-mode-vi y send -X copy-selection-and-cancel
bind Enter copy-mode
bind p paste-buffer -p
bind P choose-buffer
bind y run-shell -b "tmux save-buffer - | pbcopy"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# New panes inherit working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

# Status line
set -g status-interval 1
set -g status-style 'bg=default,fg=colour253'

# Left: prefix indicator + session name + zoom flag
set -g status-left-length 30
set -g status-left '#{?client_prefix,#[fg=colour210][C-a] ,#[fg=colour114][#S] }#{?window_zoomed_flag,#[fg=colour215][Z] ,}'

# Right: cpu | gpu? | mem | disk | net | battery? | clock
set -g status-right-length 120
set -g status-right '#[fg=colour253]#(~/.local/bin/tmux-status)'

# Window status
set -g window-status-format '#[fg=colour245] #I:#W '
set -g window-status-current-format '#[fg=colour255,bold] #I:#W '
set -g window-status-separator ''

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style 'italics'
