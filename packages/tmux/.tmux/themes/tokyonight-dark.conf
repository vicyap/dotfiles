# TokyoNight Night -- colors from folke/tokyonight.nvim extras/tmux

set -g mode-style 'fg=#7aa2f7,bg=#3b4261'
set -g message-style 'fg=#7aa2f7,bg=#3b4261'
set -g message-command-style 'fg=#7aa2f7,bg=#3b4261'

set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

set -g status-style 'bg=default,fg=#a9b1d6'

# Left: prefix indicator + session name + zoom flag
set -g status-left '#{?client_prefix,#[fg=#e0af68][C-a] ,#[fg=#7aa2f7][#S] }#{?window_zoomed_flag,#[fg=#e0af68][Z] ,}'

# Right: tmux-status
set -g status-right '#[fg=#a9b1d6]#(~/.local/bin/tmux-status)'

# Window status
set -g window-status-format '#[fg=#565f89] #I:#W '
set -g window-status-current-format '#[fg=#c0caf5,bold] #I:#W '
set -g window-status-separator ''
set -g window-status-activity-style 'italics'
