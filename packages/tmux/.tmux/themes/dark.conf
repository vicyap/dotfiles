# Catppuccin Mocha

set -g mode-style 'fg=#89b4fa,bg=#45475a'
set -g message-style 'fg=#89b4fa,bg=#45475a'
set -g message-command-style 'fg=#89b4fa,bg=#45475a'

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

set -g status-style 'bg=default,fg=#cdd6f4'

# Left: prefix indicator + session name + zoom flag
set -g status-left '#{?client_prefix,#[fg=#f9e2af][C-a] ,#[fg=#89b4fa][#S] }#{?window_zoomed_flag,#[fg=#f9e2af][Z] ,}'

# Right: tmux-status
set -g status-right '#[fg=#cdd6f4]#(~/.local/bin/tmux-status)'

# Window status
set -g window-status-format '#[fg=#6c7086] #I:#W '
set -g window-status-current-format '#[fg=#cdd6f4,bold] #I:#W '
set -g window-status-separator ''
set -g window-status-activity-style 'italics'
