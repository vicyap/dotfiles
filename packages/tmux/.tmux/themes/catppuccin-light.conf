# Catppuccin Latte

set -g mode-style 'fg=#1e66f5,bg=#bcc0cc'
set -g message-style 'fg=#1e66f5,bg=#bcc0cc'
set -g message-command-style 'fg=#1e66f5,bg=#bcc0cc'

set -g pane-border-style 'fg=#bcc0cc'
set -g pane-active-border-style 'fg=#1e66f5'

set -g status-style 'bg=default,fg=#4c4f69'

# Left: prefix indicator + session name + zoom flag
set -g status-left '#{?client_prefix,#[fg=#df8e1d][C-a] ,#[fg=#1e66f5][#S] }#{?window_zoomed_flag,#[fg=#df8e1d][Z] ,}'

# Right: tmux-status
set -g status-right '#[fg=#4c4f69]#(~/.local/bin/tmux-status)'

# Window status
set -g window-status-format '#[fg=#9ca0b0] #I:#W '
set -g window-status-current-format '#[fg=#4c4f69,bold] #I:#W '
set -g window-status-separator ''
set -g window-status-activity-style 'italics'
