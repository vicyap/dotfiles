# TokyoNight Day -- colors from folke/tokyonight.nvim extras/tmux

set -g mode-style 'fg=#2e7de9,bg=#a8aecb'
set -g message-style 'fg=#2e7de9,bg=#a8aecb'
set -g message-command-style 'fg=#2e7de9,bg=#a8aecb'

set -g pane-border-style 'fg=#a8aecb'
set -g pane-active-border-style 'fg=#2e7de9'

set -g status-style 'bg=default,fg=#6172b0'

# Left: prefix indicator + session name + zoom flag
set -g status-left '#{?client_prefix,#[fg=#8c6c3e][C-a] ,#[fg=#2e7de9][#S] }#{?window_zoomed_flag,#[fg=#8c6c3e][Z] ,}'

# Right: tmux-status
set -g status-right '#[fg=#6172b0]#(~/.local/bin/tmux-status)'

# Window status
set -g window-status-format '#[fg=#a8aecb] #I:#W '
set -g window-status-current-format '#[fg=#3760bf,bold] #I:#W '
set -g window-status-separator ''
set -g window-status-activity-style 'italics'
