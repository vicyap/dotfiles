# GitHub Light High Contrast

set -g mode-style 'fg=#ffffff,bg=#0349b4'
set -g message-style 'fg=#ffffff,bg=#0349b4'
set -g message-command-style 'fg=#ffffff,bg=#0349b4'

set -g pane-border-style 'fg=#66707b'
set -g pane-active-border-style 'fg=#0349b4'

set -g status-style 'bg=default,fg=#0e1116'

# Left: prefix indicator + session name + zoom flag
set -g status-left '#{?client_prefix,#[fg=#3f2200][C-a] ,#[fg=#0349b4][#S] }#{?window_zoomed_flag,#[fg=#3f2200][Z] ,}'

# Right: tmux-status
set -g status-right '#[fg=#0e1116]#(~/.local/bin/tmux-status)'

# Window status
set -g window-status-format '#[fg=#66707b] #I:#W '
set -g window-status-current-format '#[fg=#0e1116,bold] #I:#W '
set -g window-status-separator ''
set -g window-status-activity-style 'italics'
