# Virtual microphone source for Claude Code /voice
# Reads raw PCM audio from a FIFO pipe fed by voice-pipe over SSH
context.modules = [
    {
        name = libpipewire-module-pipe-tunnel
        args = {
            tunnel.mode = source
            pipe.filename = "/tmp/claude-voice-fifo"
            audio.format = S16LE
            audio.rate = 48000
            audio.channels = 1
            media.class = Audio/Source
            node.name = "claude-voice-mic"
            node.description = "Claude Voice Mic"
        }
    }
]
