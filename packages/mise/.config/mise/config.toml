[tools]
go = "1.26"
node = "24"
python = "3.14"
bun = "latest"
erlang = "28"
elixir = "1.19"
starship = "latest"
delta = "latest"

[tasks."setup:web"]
description = "Install web CLI from source (requires Go)"
run = """
#!/usr/bin/env bash
set -e
repo="/tmp/web-cli-build"
if [[ -d "$repo" ]]; then
  git -C "$repo" pull --quiet
else
  git clone --quiet https://github.com/chrismccord/web.git "$repo"
fi
cd "$repo" && go build -o "$HOME/.local/bin/web" .
rm -rf "$repo"
echo "✓ web CLI installed to ~/.local/bin/web"
"""

[tasks."setup:ask"]
description = "Install ask CLI (OpenRouter AI query tool)"
run = """
#!/usr/bin/env bash
set -e
mkdir -p "$HOME/.local/bin"
curl -fsSL "https://raw.githubusercontent.com/vicyap/ask/main/ask" -o "$HOME/.local/bin/ask"
chmod +x "$HOME/.local/bin/ask"
echo "✓ ask CLI installed to ~/.local/bin/ask"
echo "  Set OPENROUTER_API_KEY in ~/.secrets to use ask"
"""

[tasks."setup:ssh-opener"]
description = "Install ssh-opener (open URLs on local browser from headless remote)"
run = """
#!/usr/bin/env bash
set -e
mkdir -p "$HOME/.local/bin"
curl -fsSL "https://raw.githubusercontent.com/vicyap/ssh-opener/main/ssh-opener" -o "$HOME/.local/bin/ssh-opener"
chmod +x "$HOME/.local/bin/ssh-opener"
echo "✓ ssh-opener installed to ~/.local/bin/ssh-opener"
echo "  Set SSH_OPENER_LOCALHOST in ~/.secrets to use ssh-opener"
"""

[tasks."setup:pyright"]
description = "Install pyright-langserver (Python LSP)"
run = """
#!/usr/bin/env bash
set -e
uv tool install pyright
echo "✓ pyright-langserver installed"
"""

[tasks."setup:tmux-status"]
description = "Build and install tmux-status (Go binary for tmux status line)"
run = """
#!/usr/bin/env bash
set -e
mkdir -p "$HOME/.local/bin"
cd "$HOME/.dotfiles/packages/tmux/.tmux/status/tmux-status"
go build -ldflags="-s -w" -o "$HOME/.local/bin/tmux-status" .
echo "✓ tmux-status installed to ~/.local/bin/tmux-status"
"""

[tasks."update:tools"]
description = "Update all CLI tools (web, ask, ssh-opener, pyright, tmux-status)"
depends = ["setup:web", "setup:ask", "setup:ssh-opener", "setup:pyright", "setup:tmux-status"]
