# zram — compressed RAM-backed swap as the fast first tier of an emergency
# memory cushion. See the 2026-06-17 memory-pressure postmortem. rhinestone-only.
#
# With vm.swappiness=0 this is touched only near-OOM, ahead of the disk swapfile
# (zram defaults to a higher swap priority), so memory pressure degrades
# gracefully instead of livelocking the box.
[zram0]
zram-size = min(ram / 2, 16384)
compression-algorithm = zstd
