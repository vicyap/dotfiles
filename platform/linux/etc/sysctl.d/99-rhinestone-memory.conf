# rhinestone memory tuning — see the 2026-06-17 memory-pressure postmortem.
#
# swappiness=0: keep anonymous pages resident in RAM under normal load so the
# box stays as fast as possible; let the kernel fall back to swap only when
# reclaim is otherwise impossible (near-OOM). zram and the disk swapfile then
# act purely as an emergency cushion, with earlyoom as the livelock backstop.
#
# page-cluster=0: single-page swap readahead — best for RAM-backed zram and
# random swapfile access (no spinning-disk locality to exploit).
vm.swappiness = 0
vm.page-cluster = 0
